{% extends "base.html" %}

{% block content %}
<h1 class="big-title">{{ contato.titulo }}</h1>
<p>{{ contato.texto }}</p>
<p><a href="mailto:{{ email }}">{{ email }}</a></p>

<hr class="divider">

<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
    <span style="font-size:28px;">📄</span>
    <div>
        <b>Procurando meu currículo?</b><br>
        <a href="{{ url_for('static', filename='files/curriculo-miguel-angelo.pdf') }}" target="_blank">
            Clique aqui pra visualizar
        </a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('static', filename='files/curriculo-miguel-angelo.pdf') }}" download>
            baixar PDF
        </a>
    </div>
</div>

<hr class="divider">

<form class="contato-form" onsubmit="event.preventDefault(); alert('Formulário de exemplo — ligue isso a um envio de e-mail real depois.');">
    <input type="text" placeholder="Seu nome" required>
    <input type="email" placeholder="Seu e-mail" required>
    <textarea rows="5" placeholder="Sua mensagem" required></textarea>
    <button type="submit">Enviar</button>
</form>
{% endblock %}
